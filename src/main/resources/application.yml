server:
  servlet:
    context-path: /api

spring:
  profiles:
    active: dev
  application:
    name: shop-backend
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null

# 接口文档
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

knife4j:
  enable: true
  setting:
    language: zh_cn

# 管理端点
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
