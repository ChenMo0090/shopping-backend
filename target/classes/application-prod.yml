spring:
  datasource:
    url: jdbc:mysql://mysql:3306/shop_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: shop_user
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10

  data:
    redis:
      host: redis
      port: 6379
      password: ${REDIS_PASSWORD}

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

logging:
  level:
    com.shop: INFO
    root: WARN

shop:
  jwt:
    secret: ${JWT_SECRET}
  wx:
    app-id: ${WX_APP_ID}
    app-secret: ${WX_APP_SECRET}
  wx-pay:
    app-id: ${WX_PAY_APP_ID}
    mch-id: ${WX_PAY_MCH_ID}
    private-key-path: /app/config/apiclient_key.pem
    merchant-serial-number: ${WX_PAY_SERIAL}
    api-v3-key: ${WX_PAY_API_V3_KEY}
    notify-url: ${WX_PAY_NOTIFY_URL}
    refund-notify-url: ${WX_PAY_REFUND_NOTIFY_URL}
